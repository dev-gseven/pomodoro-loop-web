<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Pomodoro Loop</title>
  </head>
  <body style="text-align: center; background-color: #202020;">
    <canvas id="canvas" oncontextmenu="event.preventDefault()" style="cursor: default;"></canvas>
    <script>
      var canvas = document.getElementById('canvas');

      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }

      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);

      var Module = {
        canvas: canvas
      };
    </script>
    <script async type="text/javascript" src="PomodoroLoop.js"></script>
  </body>
</html>
